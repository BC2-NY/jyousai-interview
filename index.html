<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>情祭 面接カード</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f6f2;--surface:#fff;--border:#e4e2da;--border2:#cccac0;
  --text:#1c1b18;--text2:#6b6960;--text3:#a09e95;
  --accent:#3730a3;--accent-bg:#eef2ff;
  --r1-bg:#fef3c7;--r1-t:#92400e;--r1-b:#fcd34d;
  --r2-bg:#dbeafe;--r2-t:#1e40af;--r2-b:#93c5fd;
  --r3-bg:#d1fae5;--r3-t:#065f46;--r3-b:#6ee7b7;
  --r4-bg:#f3f4f6;--r4-t:#374151;--r4-b:#d1d5db;
  --r5-bg:#fce7f3;--r5-t:#9d174d;--r5-b:#f9a8d4;
  --r6-bg:#fff7ed;--r6-t:#9a3412;--r6-b:#fdba74;
  --radius:12px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── SETUP SCREEN ── */
#setupScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:0;}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:440px;}
.setup-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.setup-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.setup-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;display:block;}
.setup-input{width:100%;font-size:14px;padding:10px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;margin-bottom:14px;}
.setup-input:focus{border-color:var(--accent);}
.setup-btn{width:100%;padding:12px;font-size:14px;font-weight:700;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;}
.setup-btn:hover{opacity:.88;}
.setup-btn:disabled{opacity:.5;cursor:not-allowed;}
.setup-err{font-size:12px;color:#dc2626;margin-top:8px;display:none;}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:10px 14px;flex-wrap:wrap;}
.topbar-title{font-size:15px;font-weight:700;flex:1;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#f59e0b;flex-shrink:0;transition:background .3s;}
.sync-dot.ok{background:#10b981;}.sync-dot.err{background:#ef4444;}
.sync-label{font-size:11px;color:var(--text3);}
.count-pill{font-size:11px;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 10px;}
.icon-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:6px 11px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;white-space:nowrap;font-family:inherit;}
.icon-btn:hover{background:var(--bg);}
.search-wrap{padding:10px 14px 0;}
.search-input{width:100%;font-size:14px;padding:9px 12px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text);outline:none;font-family:inherit;}
.search-input:focus{border-color:var(--accent);}

/* ── CARDS ── */
.list{padding:10px 12px 28px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:opacity .2s;}
.card.is-done{opacity:.45;}
.card-header{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;}
.order-num{width:28px;height:28px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.name-block{flex:1;min-width:0;}
.name{font-size:16px;font-weight:700;line-height:1.2;}
.kana{font-size:11px;color:var(--text3);margin-top:1px;}
.sid{font-size:11px;color:var(--text2);background:var(--bg);border:1px solid var(--border);padding:2px 8px;border-radius:4px;flex-shrink:0;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dept-row{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px 10px;}
.dept-tag{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;border:1px solid;}
.r1{background:var(--r1-bg);color:var(--r1-t);border-color:var(--r1-b);}
.r2{background:var(--r2-bg);color:var(--r2-t);border-color:var(--r2-b);}
.r3{background:var(--r3-bg);color:var(--r3-t);border-color:var(--r3-b);}
.r4{background:var(--r4-bg);color:var(--r4-t);border-color:var(--r4-b);}
.r5{background:var(--r5-bg);color:var(--r5-t);border-color:var(--r5-b);}
.r6{background:var(--r6-bg);color:var(--r6-t);border-color:var(--r6-b);}
.reason-block{padding:0 14px 10px;}
.reason-label{font-size:11px;color:var(--text3);margin-bottom:3px;}
.reason-text{font-size:13px;color:var(--text2);line-height:1.65;word-break:break-all;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.reason-text.expanded{display:block;}
.expand-btn{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;padding:2px 0 0;font-family:inherit;}
hr.div{border:none;border-top:1px solid var(--border);margin:0 14px;}
.memo-block{padding:8px 14px 10px;}
.memo-label{font-size:11px;color:var(--text3);margin-bottom:3px;}
.memo-area{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);resize:none;font-family:inherit;min-height:52px;outline:none;}
.memo-area:focus{border-color:var(--accent);}
.card-footer{display:flex;align-items:center;justify-content:flex-end;padding:0 14px 10px;}
.done-btn{font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;}
.done-btn.done{background:var(--r3-bg);color:var(--r3-t);border-color:var(--r3-b);}

/* ── SORT PANEL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.sort-panel{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:var(--surface);border-radius:20px 20px 0 0;z-index:301;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;}
.sort-panel.open{transform:translateY(0);}
.panel-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.panel-title{font-size:15px;font-weight:700;}
.panel-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.panel-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2);font-family:inherit;}
.panel-body{overflow-y:auto;flex:1;padding:8px 12px 20px;}
.sort-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;background:var(--surface);border:1px solid var(--border);margin-bottom:6px;cursor:grab;touch-action:none;user-select:none;}
.sort-item.dragging{opacity:.3;}
.sort-item.drag-over{border:2px dashed var(--accent);background:var(--accent-bg);}
.sort-num{width:22px;height:22px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sort-name{font-size:14px;font-weight:500;flex:1;}
.sort-kana{font-size:11px;color:var(--text3);}
.sort-handle{color:var(--text3);font-size:18px;flex-shrink:0;}
.empty{text-align:center;padding:48px 16px;color:var(--text3);font-size:14px;}
</style>
</head>
<body>

<!-- ══ SETUP SCREEN ══ -->
<div id="setupScreen">
  <div class="setup-card">
    <div class="setup-title">初回設定</div>
    <div class="setup-sub">Google Apps Script の Web アプリ URL を入力してください。<br>設定は端末に保存されます（次回から不要）。</div>
    <label class="setup-label">GAS Web アプリ URL</label>
    <input class="setup-input" id="gasUrlInput" type="url" placeholder="https://script.google.com/macros/s/..." autocomplete="off">
    <button class="setup-btn" id="setupSaveBtn">接続して始める</button>
    <div class="setup-err" id="setupErr">接続に失敗しました。URLを確認してください。</div>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="mainApp" style="display:none;">
  <div class="topbar">
    <span class="topbar-title">情祭 面接カード</span>
    <div class="sync-dot" id="syncDot"></div>
    <span class="sync-label" id="syncLabel">接続中…</span>
    <span class="count-pill" id="countPill"></span>
    <button class="icon-btn" id="openSortBtn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
      並び替え
    </button>
    <button class="icon-btn" id="resetUrlBtn" title="URL再設定">⚙</button>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="search" placeholder="名前・学籍番号で検索…">
  </div>
  <div class="list" id="cardList"></div>
</div>

<!-- ══ SORT PANEL ══ -->
<div class="overlay" id="overlay"></div>
<div class="sort-panel" id="sortPanel">
  <div class="panel-hd">
    <div>
      <div class="panel-title">面接順の並び替え</div>
      <div class="panel-sub">ドラッグして順番を変更 → 全員に自動同期</div>
    </div>
    <button class="panel-close" id="closeSortBtn">×</button>
  </div>
  <div class="panel-body" id="sortList"></div>
</div>

<script>
// ══ DATA ══════════════════════════════════════════════════

4},{"name":"パンフ","rank":5},{"name":"構成","rank":6}],"reason":"先輩の話を聞いて楽しそうだなと思った。\nいろんな人との交流を増やしたい。"},{"id":"情26-467","name":"三好慧拓","kana":"ミヨシケイタ","depts":[{"name":"模擬","rank":1},{"name":"常任","rank":2},{"name":"ライブ","rank":3},{"name":"舞台","rank":4},{"name":"財務","rank":5},{"name":"講演","rank":6}],"reason":"他キャンパスの方々との親交を深め交流をさらに増やしたいと思ったから"},{"id":"情26-0341","name":"中村琉生","kana":"ナカムラルイ","depts":[{"name":"ステ外","rank":1}],"reason":"お話し会や新歓でステ外の仕事や先輩を知っていくうちに、自分もステ外として情祭を盛り上げたいと思い志望しました。ステ外での活動を通して、キャンパス祭や学園祭の成功に貢献していきたいと考えています。"},{"id":"26-368","name":"西村悠","kana":"ニシムラユウ","depts":[{"name":"講演","rank":1},{"name":"舞台","rank":2},{"name":"パンフ","rank":3},{"name":"常任","rank":4},{"name":"ステ外","rank":4},{"name":"ライブ","rank":5},{"name":"模擬","rank":6}],"reason":""},{"id":"情26-193","name":"佐伯 恭","kana":"サイキ キョウ","depts":[{"name":"ステ外","rank":1}],"reason":"履修相談の時に情祭に魅力を持ち、zoomや新歓に行く中で自分もここで活動してみたいと思った。"},{"id":"情26-0124","name":"門野美桜","kana":"カドノミオ","depts":[{"name":"舞台","rank":1},{"name":"ステ外","rank":2},{"name":"パンフ","rank":3},{"name":"広報","rank":3},{"name":"構成","rank":4},{"name":"模擬","rank":5},{"name":"常任","rank":6},{"name":"企画","rank":6}],"reason":"私は、新入生歓迎行事で1年生を全力で楽しませようと奮闘する先輩方の姿に深く感銘を受け、この「総合情報学部祭典実行委員会」の一員として、学年の垣根を超えて最高の一時を創り上げたいと強く志望しました。ただ楽しむ側ではなく、友情を大切にしながら、各々が責任を持って成長できるこの環境で、自分も貢献したいと考えています。\n現在、スターバックスでバリスタとして勤務しており、「状況把握能力」と「チームのために動く行動力」を磨いています。\n具体的には、フロアでの食器回収や荷物置きの提供など、常にお客様の動きを先読みした行動を心がけています。また、レジではお客様との会話から好みを探り「最高の一杯」を提案するなど、対人コミュニケーションにも自信があります。祭典の運営においても、仲間とミスを補い合い、来場者のニーズに迅速に応えることで、円滑なイベント運営に貢献したいと考えています。\nまた、高校時代の生徒会活動を通じ、地味な作業をコツコツとこなす大切さも理解しています。企画力や統制力で評価をいただいた経験もありますが、何より私の強みは、一度決めたことをやり遂げる継続力です。実際に、高校3年間は高い目標を持ち続け、評定平均4.8を維持することができました。この粘り強さを活かし、半年以上の長い準備期間も、責任を持って全うする覚悟です。\n仲間と協力して企画を練り上げ、会場を全力で盛り上げたいです。持ち前の明るさと真面目さを活かし、祭典の成功に向けて全力を尽くします。\n長文になってしまい申し訳ありません。\nしかしこの熱量が先輩方に伝わっていたら幸いです 。\n最後までお読みくださりありがとうございます。"},{"id":"情26-484","name":"門田知大","kana":"モンダハルト","depts":[{"name":"パンフ","rank":1},{"name":"ステ外","rank":2},{"name":"模擬","rank":3},{"name":"広報" "rank":1},{"name":"企画","rank":2},{"name":"舞台","rank":3},{"name":"広報","rank":4},{"name":"常任","rank":5},{"name":"模擬","rank":6}],"reason":"先輩同級生と関わり増やしたいし、大学在学中に何かみんなと協力して成し遂げてみたいと思ったから"},{"id":"26-354","name":"西海　功庸","kana":"ニシウミ　コウヨウ","depts":[{"name":"常任","rank":1},{"name":"パンフ","rank":2},{"name":"模擬","rank":3},{"name":"ライブ","rank":4},{"name":"構成","rank":5},{"name":"講演","rank":6}],"reason":"私が情祭に入りたいと思った理由を端的に言うと、一つは楽しそうやしかっこいい、もう一つは自分自身のある能力を伸ばしたいからです。\n\n楽しそうやしかっこいい、と思ったのは入学する前にサークルを探していた時、情祭のインスタを見つけました。めちゃくちゃ楽しそうなのが画面越しでも伝わってきて、すぐに入りたくなりました。\nその後どの局に入ろうかなと各局の紹介を見た時、常任に一目惚れしました。一番かっこいい。仕事内容なども自分のもう一つの志望動機を満たすものだったので、常任を第一志望とさせてもらいました。\n\n自分自身の伸ばしたいある能力とは、相手の立場になって物事を考える力です。\n私は将来何をしたいかはまだ決まっていないのですが、起業でも就職でも人と関わる仕事をしたいと思っています。その際に必要となる能力を考え中高生の頃、感じたことを思い出しました。\n私は中学生の時に体育祭の団長を務めさせてもらってたのですが、中学一、ニ、三年生に指示を素直に聞いてもらうのは難しく、特に列に並ばせるのに苦労していましたが、「並んで」と言っていたのを「並んで欲しいな」という指示ではなくお願いという形に変えてみると見違えるようにすぐに並ぶようになってくれました。考えてみれば、相手にとっては指示よりもお願いの方がやってあげようという気持ちになりやすいです。その時、相手の立場になって考える力というのはとても大事な能力だということに気づきました。高校生の時には、逆に厳しめに指示するタイミングなども掴みました。しかし、少人数規模での活動が多かったので、もっと大規模な団体でこの能力を伸ばしたいと思っていました。\nその時、情祭と常任を見つけました。常任は一番規模が大きく、違うキャンパスの人も集まるので、色んな立場や価値観が発生すると考え、まさに自分の望む環境だと思い、絶対にここに入ってやろうと決意しました。\n第二〜第六志望に外局を志望しているのも、外局の方が自分が成長できると思ったからです。\n\n長々と書きましたが、結局楽しみたいが9割って感じです。\n\n2回生では委員長になって情祭を引っ張っていき、3回生になっても残って活動したいです。\n\n\n\n面接よろしくお願いします。"},{"id":"情26ー0089","name":"大上莉央","kana":"オオウエリオ","depts":[{"name":"舞台","rank":1}],"reason":"舞台局に入り、表現力を付けたいと考えています。舞台局の先輩、同級だけでなく、他の局の先輩たちとも仲良くしたいと思っています。"},{"id":"情26-195","name":"齊藤陽","kana":"サイトウハル","depts":[{"name":"パンフ","rank":1},{"name":"ステ外","rank":2},{"name":"模擬","rank":3},{"name":"講演","rank":4},{"name":"ライブ","rank":5},{"name":"広報","rank":6}],"reason":"大学入学する前に、高槻キャンパスにあるサークルなどを探していたところ情祭のインスタのアカウントを見つけ入学前から気になっていました。履修相談会に参加させて頂き先輩方ともお喋りしてさらに情祭に入りたいなと思いました。\n本キャンパスの人とも外局であれば関わる機会があるところや、企業訪問であったり、模擬店の管理などといった他のサークルでは経験できないことをすることができるのも魅力的だなと思いました。"},{"id":"情26-0006","name":"赤澤 琳子","kana":"アカザワ リコ","depts":[{"name":"構成","rank":1},{"name":"舞台","ra 品","rank":5},{"name":"模擬","rank":6}],"reason":"インスタを拝見させていただいて、すごく楽しそうだなと感じ、私も一員になりたいと思いました。地元の先輩、高校の先輩もいて、心強いので、一生懸命頑張りたいです。"},{"id":"情26-24","name":"安藤　優那","kana":"アンドウ ユナ","depts":[{"name":"パンフ","rank":1},{"name":"常任","rank":2},{"name":"広報","rank":3},{"name":"企画","rank":4}],"reason":"総合情報学部に入学すると決まった時からずっとインスタグラムなどでどのサークルに入るか検索をしていたところ、情祭のインスタを見つけ、まずは第一印象としてとても楽しそうだなと思ったのとそれに何かを一緒に頑張って成し遂げるのは絆が生まれると思うし、先輩後輩ともとても仲良くなれるのではないかと思い気になりました。その後局紹介などを見て自分は千里山の方々とも沢山関わっていきたいし、外局の会議などがとても楽しそうで外局に入りたいとなりました。その中でもインスタを見るとパンフレット局は遊びがとても多そうで楽しそうだなと感じたのととても仲良さそうだったので特に気になりました。実際学校が始まって新歓などの様子を見てみると皆さんとても仲良くて、わいわいしていてとても楽しそうだし青春が送れそうと思ってより入りたいなという気持ちが強くなりました。もちろん第1希望の局に入りたいという気持ちはありますが、情祭に入れるだけでもとても楽しいんだろうなと思いました。もし入れたら、皆さんと学祭をより盛り上げたいと思っております！よろしくお願いします！"},{"id":"情26-0255","name":"高木こころ","kana":"タカギココロ","depts":[{"name":"パンフ","rank":1},{"name":"舞台","rank":2},{"name":"構成","rank":3},{"name":"ステ外","rank":4},{"name":"講演","rank":5},{"name":"ライブ","rank":6}],"reason":"元々学祭に関わりたいと入学当初から思っていました。説明会や新歓を通して、仕事内容や合宿やドライブなどイベントがあることを知り、たくさんの人達と仲良くなれる他、充実した学校生活が送れると思ったからです。"},{"id":"情26-0526","name":"吉田楓菜","kana":"ヨシダカナ","depts":[{"name":"講演","rank":1},{"name":"模擬","rank":2},{"name":"パンフ","rank":3},{"name":"構成","rank":4},{"name":"広報","rank":4},{"name":"財務","rank":5}],"reason":"インスタ見たり、履修登録の相談しに行ったりしたときに楽しそうだと思ったのがきっかけです。知っていくうちに学園祭をただ楽しむだけじゃなくて、楽しさを作り出して周りを盛り上げる側になりたいと思いました。たくさんの人と協力してやりがいもありながら仲良くなって思い出も作れるのは情祭しかないと思ったので志望しました！"},{"id":"情26-0099","name":"岡野　結希奈","kana":"オカノ　ユキナ","depts":[{"name":"パンフ","rank":1},{"name":"ライブ","rank":2},{"name":"講演","rank":3},{"name":"財務","rank":4},{"name":"舞台","rank":5},{"name":"模擬","rank":6}],"reason":"高校の時から関大の学祭実行委員会が楽しそうだし自分も成長しそうでいいなっと思っていて学部が決まってからはすぐインスタをフォローしてずっと入りたいと思ってました。高校の時にダンス部に所属していて、その中に代表4人がいました。4人とも最後にはとても成長してて仲良くなってて楽しそうでした。この実行委員は総情の代表みたいな感じだと思っていて私も総情を盛り上げたいし、成長したいので志望しました。やる気がある仲間と高め合って関大を盛り上げたくて志望しました。"},{"id":"情26-454","name":"三澤　望未","kana":"ミサワ　ノゾミ","depts":[{"name":"舞台","rank":1},{"name":"ステ外","rank":2}],"reason":"履修登録の際に、情祭の方々に優しく教えていただいて、情祭に入りたいと思いました。そして、情祭のインスタグラムの投稿を見て、更に行きたいと思ったからです。"},{"id":"情26-0322","name":"内藤佑生","kana":"ナイトウユウキ","depts":[{"name":"パンフ","rank":1},{"name":"ステ外","rank":2},{"name":"財務","rank":3},{"name":"備品","rank":4},{"name":"舞台","rank":5},{"name":"企画","rank":6}],"reason":"高槻キャンパスで精力的に活動してるサークルや部活といえばボラボラか情祭だったので、将来の力になったり、楽しそうだったので情祭に志望しました。"},{"id":"情26-166","name":"日下部みくる","kana":"クサカベミクル","depts":[{"name":"パンフ","rank":1},{"name":"構成","rank":2},{"name":"講演","rank":3},{"name":"ライブ","rank":4},{"name":"ステ外","rank":5},{"name":"広報","rank":6}],"reason":"情祭に興味があってお話会にいくと優しい先輩たちから楽しい話をたくさん聞かせてもらってもっと入りたい気持ちが強くなりました。"},{"id":"情 26-252","name":"宗 七葉","kana":"ソウナナハ","depts":[{"name":"ステ外","rank":1},{"name":"ライブ","rank":2},{"name":"舞台","rank":3},{"name":"構成","rank":4},{"name":"講演","rank":5},{"name":"模擬","rank":6}],"reason":"イベントに関わるのがずっと好きで、他の人と協力して何かを作り上げる経験を大学でしたいと感じたからです。"},{"id":"情26-0226","name":"島津江 佳歩","kana":"シマヅエ カホ","depts":[{"name":"舞台","rank":1},{"name":"構成","rank":2},{"name":"パンフ","rank":3},{"name":"ステ外","rank":4},{"name":"備品","rank":5}],"reason":"先輩みんなやさしくてさいっこうに面白いから"},{"id":"情 26-0061","name":"今村 日菜乃","kana":"イマムラ ヒナノ","depts":[{"name":"常任","rank":1},{"name":"ステ外","rank":2},{"name":"構成","rank":3},{"name":"舞台","rank":4},{"name":"講演","rank":5},{"name":"模擬","rank":6}],"reason":"私は、文化祭を楽しむだけでなく、自分の手でつくり上げる側として関わりたい！と思い志望しました。地元の先輩や先輩方から活動の話、やりがいや魅力を聞いて、自分もこの一員として文化祭を実行する人になりたいと思うようになりました。\nその中でも常任局は、全体の中心となって多くの人と関わりながら文化祭を動かしていく立場であり、人と関わることや物事を動かすことが大好きな私にとって、最も挑戦したい場所です！また、本キャンパスの人と関われる機会が増える点も志望理由の1つとなってます。\nこれまで学級委員長としてクラスの中心に立ち、周囲を見ながら行動してきました。バイトでもクルー同士で連携していつも働いてます！計画を立てて行動する力や、明るく周囲と関わる力にはとても自信があります！！\n常任局の一員として、周囲と積極的に関わりながら文化祭をもっと良いものにできるよう全力で取り組みたいです。そして、自分自身も成長し続けられるよう挑戦していきたいと考えています！よろしくお願いします。"},{"id":"26-426","name":"古川怜花","kana":"フルカワレイカ","depts":[{"name":"舞台","rank":1},{"name":"ステ外","rank":2},{"name":"パンフ","rank":3}],"reason":"大学生活を充実したものにしたい思いがあり、部活やサークルなどを沢山体験していました。その中で17日のリクリエーションに参加した際に、先輩の方たちと親しみやすい良い雰囲気で、また自分のしたかったことにマッチしているおり、ここで頑張りたいと感じたので志望しました。"},{"id":"26-0535","name":"渡辺風香","kana":"ワタナベフウカ","depts":[{"name":"舞台","rank":1},{"name":"ステ外","rank":2},{"name":"パンフ","rank":3}],"reason":"多くの総情生との交流の場が欲しかったから。"},{"id":"情26-0222","name":"澤田歩果","kana":"サワダホノカ","depts":[{"name":"ライブ","rank":1},{"name":"講演","rank":2},{"name":"構成","rank":3},{"name":"舞台","rank":4},{"name":"ステ外","rank":5},{"name":"企画","rank":6}],"reason":"情祭\n高校生の頃に初めて知り、ずっと入りたいと思っていました。学園祭の運営をすることに憧れていたので志望しました。\n\nライブ局\n最近初めてフェスに参加し、その楽しさを知りました。その経験から来場者の方々に最高の時間を届けられるようにアーティストさんたちを支えたいと思いました。先輩方から大変なこともあるがそれ以上にやりがいや楽しいことがたくさんあり、学園祭が終わった後の達成感がすごいというお話しを聞き、私もその一員として関わり、ライブを成功させたいと思い、志望しました。\n\n講演局\n来場者の方々に楽しんでいただくためにタレントさんたちを支えたいと思い、志望しました。\n\n構成局\n企画を一から自分たちで作り上げるところに魅力を感じました。このような機会は少なく、この経験が将来的にも活かせると思い、志望しました。一から考えることでやりがいが感じられると思いました。\n\n舞台局\n幼い頃から人前に立つことが好きで、これまでの経験を活かし、先輩方や同期と協力して多くの人を楽しませたいと思い、志望しました。\n\nステ外局\n高校時代に文化祭で模擬企画に参加し、楽しかったので、今度は自分が企画や運営をする側になり来場者の方々を楽しませたいと考え、志望しました。\n\n企画局\n新歓で先輩方が考えた企画でたくさんの人が楽しんでいる様子を見て、そのような瞬間に関わりたいと思い、志望しました。企画を一から考えることで達成感が得られたり、将来的にも役立つと思い、これを機に挑戦したいなと思いました。\n\nどの局に入っても全力で取り組み、最高に楽しい学園祭を作りたいと考えています。イベントも全て参加したいです。よろしくお願い致します。"},{"id":"情26-0432","name":"本多愛芭","kana":"ホンダマナハ","depts":[{"name":"模擬","rank":1},{"name":"パンフ","rank":2},{"name":"ライブ","rank":3},{"name":"常任","rank":4},{"name":"講演","rank":5},{"name":"財務","rank":6}],"reason":"私が情祭に参加したい理由は、関西大学に入学したからこそできる経験を最大限に活かし、学園祭を盛り上げる一員として貢献したいからです。新歓に参加し先輩方とお話しした際、初対面でも緊張せずに話すことができる雰囲気をつくってくださったことが印象に残りました。その一方で、学園祭に対する真剣な姿勢も感じました。私も情祭に入って、自分自身がただ参加する側ではなく、主体的に関わって意見を述べたり行動したりすることで成長したいと思っています。よろしくお願いします。"},{"id":"情26-0151","name":"北原英奈","kana":"キタハラエナ","depts":[{"name":"舞台","rank":1}],"reason":"高校のダンス部での経験を活かし、多くの人に楽しさや感動を届けたいからです。先輩方が仲良いところを見て、ち自分もその一員として仲間と協力して一つの作品を完成させるという貴重な経験をしてみたいと思いました。"},{"id":"情26-0110","name":"尾下 菜々子","kana":"オシタ ナナコ","depts":[{"name":"ライブ","rank":1},{"name":"パンフ","rank":2},{"name":"模擬","rank":3},{"name":"講演","rank":4},{"name":"ステ外","rank":5},{"name":"舞台","rank":6}],"reason":"私は人に喜んでもらえることにやりがいを感じる性格です。そういう自分の強みを活かして、たくさんの人が関わる文 name":"西谷光成","kana":"ニシタニコウセイ","depts":[{"name":"パンフ","rank":1},{"name":"講演","rank":2},{"name":"ライブ","rank":3}],"reason":"私は、合格をいただいた大分大学と関西大学のどちらに行くのかをすごく悩んでいました。親や塾の先生とどっちがいいのか毎日考えていました。あるとき先生に自分の中で一番譲れないものを考えてみたらと言われました。自分の中で一番譲れないものは、楽しくて、振り返った時にいい時間だったなと思える時間を過ごすことでした。そのことをメインにどちらにしようか考えていた時に、情祭のことを知りました。すごく楽しそうで、みんな仲が良さそうで、やりがいもあって、これが自分の中で1番譲れないものだなと感じました。なので、わたしは情祭に入りたいです。"},{"id":"情26-0206","name":"坂本遥菜","kana":"サカモトハルナ","depts":[{"name":"ライブ","rank":1}],"reason":"私は中学生で体育祭実行委員、高校で文化祭のクラス代表を務め、高校1年生から高校3年生までの3年間でイベントスタッフとしてアルバイトをしていました。その経験から、イベントを支える側をしたいという思いが強くあり、特にライブ局でライブという大きなイベントを支える裏方のお仕事がしたいと思い、応募しました。"},{"id":"情26-350","name":"長戸葵依","kana":"ナガトアオイ","depts":[{"name":"常任","rank":1},{"name":"模擬","rank":2},{"name":"ステ外","rank":3},{"name":"舞台","rank":4}],"reason":"常任の幹人さんと話して楽しそうだと思いました。"},{"id":"情26-0210","name":"笹井梨瑚","kana":"ササイリコ","depts":[{"name":"舞台","rank":1}],"reason":"まず、私は大学生活で様々な経験を積みたいと考えています。情祭では、みんなで楽しめることを考えたり、チームで1から舞台を作り上げる、みんなで一つのことをするという経験ができるため、志望しました。\n中学、高校の時は、舞台に立って活動したことはあまり無かったのですが、大学生活では、新しいことに積極的に挑戦したいと考えています。\n　次に、第一志望に舞台局を志望した理由としては、局長のまおさんとお話した際に、楽しそうな雰囲気が伝わってきたこと、人柄も良さそうでみんなが仲がいい感じが伝わってきて、自分もこの輪に入って周りの人も巻き込んで楽しみたいと感じたからです。\n　最後に、私は情祭の舞台局に入ってみんなと楽しめるものを創り上げたいと考えています。よろしくお願いします。"}];

const RC = ['','r1','r2','r3','r4','r5','r6'];
const LS_KEY = 'jousai_gas_url';
let GAS_URL = 'https://script.google.com/macros/s/AKfycbzB3ZcIjGUdKVWmwbJ0hxCZfPLSYTE6hTH_mOu3XLc0naI7Vyakelf4b_InDXvKbAs7qA/exec';
let order = RAW.map((_,i)=>i);
let memos = {};
let doneSet = new Set();
let searchQ = '';
let panelOpen = false;
let saveTimer = null;
let pollTimer = null;
let saving = false;
let lastSaved = '';

// ══ GAS API ═══════════════════════════════════════════════
async function gasGet(key) {
  console.log('🔄 GET:', key);
  const r = await fetch(`${GAS_URL}?key=${encodeURIComponent(key)}`);
  console.log('✓ GET response:', r.status);
  if (!r.ok) throw new Error(`GET failed: ${r.status}`);
  const j = await r.json();
  if (j.error) throw new Error(`API error: ${j.error}`);
  console.log('✓ GET value:', j.value);
  return j.value ?? null;
}
async function gasSet(key, value) {
  console.log('💾 POST:', key, typeof value);
  const payload = JSON.stringify({key, value});
  console.log('💾 payload size:', payload.length, 'bytes');
  const r = await fetch(GAS_URL, {
    method: 'POST',
    body: payload
  });
  console.log('✓ POST response:', r.status);
  if (!r.ok) throw new Error(`POST failed: ${r.status}`);
  const j = await r.json();
  console.log('✓ POST result:', j);
  if (j.error) throw new Error(`API error: ${j.error}`);
  return j;
}

// ══ SYNC ══════════════════════════════════════════════════
async function loadRemote() {
  try {
    console.log('🔄 loadRemote started');
    const [ro, rm, rd] = await Promise.all([
      gasGet('order'), gasGet('memos'), gasGet('done')
    ]);
    let changed = false;
    if (ro) { const v = JSON.parse(ro); if (JSON.stringify(v) !== JSON.stringify(order)) { order=v; changed=true; console.log('✓ order updated'); } }
    if (rm) { const v = JSON.parse(rm); if (JSON.stringify(v) !== JSON.stringify(memos)) { memos=v; changed=true; console.log('✓ memos updated'); } }
    if (rd) { const v = JSON.parse(rd); const ns = new Set(v); if ([...ns].sort().join()!=[...doneSet].sort().join()) { doneSet=ns; changed=true; console.log('✓ done updated'); } }
    setSyncOk();
    if (changed && !document.activeElement.closest('.memo-area')) { render(); if (panelOpen) renderSortList(); }
  } catch(e) { console.error('❌ loadRemote error:', e); setSyncErr(); }
}

async function saveRemote() {
  if (saving) return;
  const snap = JSON.stringify({order, memos, done:[...doneSet]});
  if (snap === lastSaved) { console.log('⏭️ saveRemote: no changes'); return; }
  saving = true; setSyncIng();
  try {
    console.log('💾 saveRemote: sending data...');
    await Promise.all([
      gasSet('order', JSON.stringify(order)),
      gasSet('memos', JSON.stringify(memos)),
      gasSet('done',  JSON.stringify([...doneSet]))
    ]);
    lastSaved = snap; setSyncOk();
    console.log('✓ saveRemote: success');
  } catch(e) { console.error('❌ saveRemote error:', e); setSyncErr(); }
  saving = false;
}

function setSyncOk()  { sd().className='sync-dot ok';  sl().textContent='同期済み'; }
function setSyncIng() { sd().className='sync-dot';     sl().textContent='同期中…'; }
function setSyncErr() { sd().className='sync-dot err'; sl().textContent='同期エラー'; }
const sd = () => document.getElementById('syncDot');
const sl = () => document.getElementById('syncLabel');

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadRemote, 4000);
}

// ══ SETUP ═════════════════════════════════════════════════
function checkSetup() {
  const saved = localStorage.getItem(LS_KEY);
  if (saved) { GAS_URL = saved; }
  showMain();
}

document.getElementById('setupSaveBtn').addEventListener('click', async () => {
  const url = document.getElementById('gasUrlInput').value.trim();
  if (!url.startsWith('https://')) return;
  const btn = document.getElementById('setupSaveBtn');
  btn.disabled = true; btn.textContent = '接続確認中…';
  document.getElementById('setupErr').style.display='none';
  try {
    GAS_URL = url;
    await gasGet('order');
    localStorage.setItem(LS_KEY, url);
    showMain();
  } catch(e) {
    document.getElementById('setupErr').style.display='block';
    btn.disabled=false; btn.textContent='接続して始める';
  }
});

document.getElementById('resetUrlBtn').addEventListener('click', () => {
  if (!confirm('GAS URLを再設定しますか？')) return;
  clearInterval(pollTimer);
  localStorage.removeItem(LS_KEY);
  document.getElementById('mainApp').style.display='none';
  document.getElementById('setupScreen').style.display='flex';
  document.getElementById('gasUrlInput').value = '';
});

function showMain() {
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  loadRemote().then(()=>{ render(); startPolling(); });
}

// ══ SEARCH ════════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.trim(); render();
});

// ══ SORT PANEL ════════════════════════════════════════════
document.getElementById('openSortBtn').addEventListener('click', openPanel);
document.getElementById('closeSortBtn').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', closePanel);

function openPanel()  { panelOpen=true;  document.getElementById('overlay').classList.add('open'); document.getElementById('sortPanel').classList.add('open'); renderSortList(); }
function closePanel() { panelOpen=false; document.getElementById('overlay').classList.remove('open'); document.getElementById('sortPanel').classList.remove('open'); }

let sortDrag=null, tSrc=null, tClone=null, tOffY=0;

function renderSortList() {
  const sl = document.getElementById('sortList');
  sl.innerHTML = '';
  order.forEach((idx, pos) => {
    const s = RAW[idx];
    const d1 = s.depts[0];
    const el = document.createElement('div');
    el.className = 'sort-item'; el.dataset.idx = idx; el.draggable = true;
    el.innerHTML = `<span class="sort-num">${pos+1}</span>
      <div style="flex:1;min-width:0;"><div class="sort-name">${s.name}</div><div class="sort-kana">${s.kana}</div></div>
      ${d1?`<span class="dept-tag r1" style="font-size:11px;padding:2px 8px;">${d1.name}</span>`:''}
      <span class="sort-handle">⠿</span>`;
    el.addEventListener('dragstart', e=>{sortDrag=idx; setTimeout(()=>el.classList.add('dragging'),0); e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend', ()=>{el.classList.remove('dragging'); sl.querySelectorAll('.sort-item').forEach(c=>c.classList.remove('drag-over'));});
    el.addEventListener('dragover', e=>{e.preventDefault(); sl.querySelectorAll('.sort-item').forEach(c=>c.classList.remove('drag-over')); el.classList.add('drag-over');});
    el.addEventListener('drop', e=>{
      e.preventDefault(); if(sortDrag===null||sortDrag===idx) return;
      const f=order.indexOf(sortDrag), t=order.indexOf(idx);
      order.splice(f,1); order.splice(t,0,sortDrag); sortDrag=null;
      renderSortList(); render(); saveRemote();
    });
    el.addEventListener('touchstart', tStart, {passive:true});
    el.addEventListener('touchmove', tMove, {passive:false});
    el.addEventListener('touchend', tEnd);
    sl.appendChild(el);
  });
}

function tStart(e) {
  const card = e.currentTarget; tSrc = parseInt(card.dataset.idx);
  const r = card.getBoundingClientRect(); tOffY = e.touches[0].clientY - r.top;
  tClone = card.cloneNode(true);
  tClone.style.cssText=`position:fixed;top:${r.top}px;left:${r.left}px;width:${r.width}px;opacity:.75;pointer-events:none;z-index:9999;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.18);`;
  document.body.appendChild(tClone); card.style.opacity='.25';
}
function tMove(e) {
  if(!tClone) return; e.preventDefault();
  tClone.style.top=(e.touches[0].clientY-tOffY)+'px';
  const sl=document.getElementById('sortList');
  sl.querySelectorAll('.sort-item').forEach(c=>c.classList.remove('drag-over'));
  const over=document.elementsFromPoint(e.touches[0].clientX,e.touches[0].clientY).find(el=>el.classList&&el.classList.contains('sort-item')&&parseInt(el.dataset.idx)!==tSrc);
  if(over) over.classList.add('drag-over');
}
function tEnd(e) {
  if(!tClone) return; tClone.remove(); tClone=null;
  document.querySelectorAll('.sort-item').forEach(c=>{c.style.opacity='';c.classList.remove('drag-over');});
  const over=document.elementsFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY).find(el=>el.classList&&el.classList.contains('sort-item')&&parseInt(el.dataset.idx)!==tSrc);
  if(over){const ti=parseInt(over.dataset.idx),f=order.indexOf(tSrc),t=order.indexOf(ti);order.splice(f,1);order.splice(t,0,tSrc);renderSortList();render();saveRemote();}
  tSrc=null;
}

// ══ CARDS ════════════════════════════════════════════════
function debounceSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveRemote, 1000);
}

function filteredOrder() {
  return order.filter(i => {
    if (!searchQ) return true;
    const s = RAW[i];
    return s.name.includes(searchQ)||s.kana.includes(searchQ)||s.id.includes(searchQ);
  });
}

function render() {
  const activeTaId = document.activeElement.id;
  const fo = filteredOrder();
  document.getElementById('countPill').textContent = fo.length+'名';
  const list = document.getElementById('cardList');
  list.innerHTML = '';
  if (!fo.length) { list.innerHTML='<div class="empty">該当者なし</div>'; return; }
  fo.forEach((idx, pos) => {
    const s = RAW[idx];
    const el = document.createElement('div');
    el.className = 'card'+(doneSet.has(idx)?' is-done':'');
    el.dataset.idx = idx;
    const dh = s.depts.map(d=>`<span class="dept-tag ${RC[Math.min(d.rank,6)]}">${d.rank}位 ${d.name}</span>`).join('');
    const rs = (s.reason||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    el.innerHTML = `
      <div class="card-header">
        <div class="order-num">${pos+1}</div>
        <div class="name-block"><div class="name">${s.name}</div><div class="kana">${s.kana}</div></div>
        <div class="sid">${s.id}</div>
      </div>
      <div class="dept-row">${dh}</div>
      ${rs?`<div class="reason-block"><div class="reason-label">志望動機</div>
        <div class="reason-text" id="rt${idx}">${rs}</div>
        <button class="expand-btn" id="eb${idx}" onclick="toggleR(${idx})">続きを読む ▼</button>
      </div>`:''}
      <hr class="div">
      <div class="memo-block"><div class="memo-label">面接メモ</div></div>
      <div class="card-footer">
        <button class="done-btn${doneSet.has(idx)?' done':''}" onclick="toggleDone(${idx})">${doneSet.has(idx)?'面接済み ✓':'未実施'}</button>
      </div>`;
    const ta = document.createElement('textarea');
    ta.className = 'memo-area';
    ta.placeholder = 'ここにメモ…';
    ta.id = `memo${idx}`;
    if (activeTaId !== `memo${idx}`) ta.value = memos[idx] || '';
    ta.addEventListener('input', ()=>{ memos[idx]=ta.value; autoH(ta); debounceSave(); });
    ta.addEventListener('focus', ()=>autoH(ta));
    el.querySelector('.memo-block').appendChild(ta);
    list.appendChild(el);
    requestAnimationFrame(()=>{
      const rt=document.getElementById(`rt${idx}`), eb=document.getElementById(`eb${idx}`);
      if(rt&&eb&&rt.scrollHeight<=rt.clientHeight+4) eb.style.display='none';
      if(ta) autoH(ta);
    });
  });
}

function autoH(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function toggleR(idx){const rt=document.getElementById(`rt${idx}`),eb=document.getElementById(`eb${idx}`);if(!rt)return;const e=rt.classList.toggle('expanded');eb.textContent=e?'折りたたむ ▲':'続きを読む ▼';}
function toggleDone(idx){doneSet.has(idx)?doneSet.delete(idx):doneSet.add(idx);render();if(panelOpen)renderSortList();saveRemote();}

// ══ START ═════════════════════════════════════════════════
checkSetup();
</script>
</body>
</html>
